---
schema_version: 1
project: gentoo-ai-installer
description: Canonical operator configuration schema for the Gentoo installer.

variables:
  PROFILE:
    ansible_names:
      - profile
      - init_system
    default: openrc
    allowed:
      - openrc
      - systemd
    required_for:
      - plan
      - apply
    notes: Selects the init variant. Shared Ansible roles must use this to dispatch only genuinely init-specific behavior.

  FILESYSTEM:
    ansible_names:
      - filesystem
    default: ext4
    allowed:
      - ext4
      - btrfs
    required_for:
      - plan
      - apply
    notes: Selects the approved root filesystem layout.

  STAGE3_FLAVOR:
    ansible_names:
      - stage3_flavor
    default: standard
    allowed:
      - standard
      - hardened
      - musl
    required_for:
      - plan
      - stage3
      - apply
    notes: Selects the official Gentoo stage3/profile family independently of init system. Standard preserves existing VM case names; hardened and musl append the flavor in matrix names.

  STAGE3_MIRROR:
    ansible_names:
      - stage3_mirror
    default: https://distfiles.gentoo.org/releases/amd64/autobuilds
    required_for:
      - stage3
    notes: Official Gentoo autobuild metadata mirror base URL. Overrides must still pass checksum and signature verification.

  STAGE3_CACHE_DIR:
    ansible_names:
      - stage3_cache_dir
    default: /tmp/gentoo-ai-installer/stage3
    required_for:
      - stage3
    notes: Live-ISO-local cache for stage3 downloads and verification metadata. Must not be inside TARGET_MOUNT.

  PORTAGE_GENTOO_MIRRORS:
    ansible_names:
      - portage_gentoo_mirrors
    default: https://distfiles.gentoo.org
    required_for:
      - portage
    notes: HTTPS Gentoo distfiles mirror written to target make.conf. v1 treats this as a single URL value.

  BOOT_MODE:
    ansible_names:
      - boot_mode
    default: uefi
    allowed:
      - uefi
    required_for:
      - plan
      - apply
    notes: BIOS boot is outside v1 scope.

  INSTALL_DISK:
    ansible_names:
      - install_disk
    default: null
    required_for:
      - destructive_apply
    no_default: true
    notes: Must be an explicit disk path discovered on the target live ISO. VM examples such as /dev/vda are valid only inside the local libvirt guest.

  HOSTNAME:
    ansible_names:
      - hostname
    default: gentoo
    required_for:
      - apply
    notes: Target system hostname.

  TIMEZONE:
    ansible_names:
      - timezone
    default: UTC
    required_for:
      - apply
    notes: Target timezone under /usr/share/zoneinfo, for example UTC or Europe/Stockholm.

  LOCALE:
    ansible_names:
      - locale
    default: en_US.UTF-8
    required_for:
      - apply
    notes: Target UTF-8 locale written to /etc/locale.gen and /etc/env.d/02locale.

  KEYMAP:
    ansible_names:
      - keymap
    default: us
    required_for:
      - apply
    notes: Console keymap written to OpenRC keymaps config or systemd vconsole config.

  ADMIN_USER:
    ansible_names:
      - admin_user
    default: null
    required_for:
      - users
    notes: Optional admin account name. Passwords or private keys must not be passed through this schema.

  ADMIN_GROUPS:
    ansible_names:
      - admin_groups_csv
    default: wheel
    required_for:
      - users
    notes: Comma-separated admin supplementary groups. The default uses sudo through the wheel group.

  ADMIN_SHELL:
    ansible_names:
      - admin_shell
    default: /bin/bash
    required_for:
      - users
    notes: Target login shell for the admin user.

  PRIVILEGE_TOOL:
    ansible_names:
      - privilege_tool
    default: sudo
    allowed:
      - sudo
    required_for:
      - users
    notes: Current implementation configures sudo only; doas requires a future OpenSpec change.

  ADMIN_SUDO_NOPASSWD:
    ansible_names:
      - admin_sudo_nopasswd
    default: "no"
    allowed:
      - "yes"
      - "no"
    required_for:
      - users
    notes: Optional passwordless sudo policy for the admin groups. Normal installs treat unset as no. Disposable libvirt E2E installs default to yes through VM_E2E_ADMIN_SUDO_NOPASSWD.

  ADMIN_AUTHORIZED_KEYS_FILE:
    ansible_names:
      - admin_authorized_keys_file
    default: null
    required_for:
      - users
    notes: Optional controller-local, gitignored authorized_keys input file. Contents are not printed or committed.

  ADMIN_PASSWORD_HASH_FILE:
    ansible_names:
      - admin_password_hash_file
    default: null
    required_for:
      - users
    notes: Optional controller-local, gitignored file containing one admin password hash. Hash values must not be committed or logged.

  ROOT_PASSWORD_HASH_FILE:
    ansible_names:
      - root_password_hash_file
    default: null
    required_for:
      - users
    notes: Optional controller-local, gitignored file containing one root password hash. Root SSH login remains disabled when SSH is enabled.

  ENABLE_SSH:
    ansible_names:
      - enable_ssh
    default: "no"
    allowed:
      - "yes"
      - "no"
    required_for:
      - apply
    notes: Controls installed-system SSH policy once that workflow is implemented.

  ENABLE_WIFI:
    ansible_names:
      - enable_wifi
    default: "no"
    allowed:
      - "yes"
      - "no"
    required_for:
      - apply
    notes: Installs installed-system WiFi firmware and supplicant support when explicitly requested. This does not store SSIDs, passphrases, or NetworkManager connection secrets.

  ENABLE_QEMU_GUEST_AGENT:
    ansible_names:
      - enable_qemu_guest_agent
    default: "no"
    allowed:
      - "yes"
      - "no"
    required_for:
      - apply
    notes: Installs and enables app-emulation/qemu-guest-agent for VM integration when explicitly requested. Proxmox validation may set this to yes; normal installs default to no.

  TARGET_MOUNT:
    ansible_names:
      - target_mount
    default: /mnt/gentoo
    required_for:
      - apply
    notes: Live ISO mountpoint for the target root.

  EFI_MOUNT:
    ansible_names:
      - efi_mount
    default: /mnt/gentoo/boot/efi
    required_for:
      - apply
    notes: Live ISO mountpoint for the target EFI system partition.

  I_UNDERSTAND_THIS_WIPES_DISK:
    ansible_names:
      - confirm_wipe_disk
    default: null
    allowed:
      - "yes"
    required_for:
      - destructive_apply
    no_default: true
    notes: Required only for destructive disk apply workflows.

  I_UNDERSTAND_BOOTLOADER_CHANGES:
    ansible_names:
      - bootloader_confirmation
    default: null
    allowed:
      - "yes"
    required_for:
      - bootloader
    no_default: true
    notes: Required for GRUB/EFI bootloader workflows that may update EFI boot entries.

unsupported_v1:
  - bios_boot
  - luks
  - default_install_disk
  - custom_iso
