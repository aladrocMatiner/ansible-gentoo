---
- name: Validate systemd service inputs
  ansible.builtin.assert:
    that:
      - profile == 'systemd'
      - init_system == 'systemd'
      - init_target_root | default('/mnt/gentoo') == '/mnt/gentoo'
      - init_service_list is defined
      - init_service_list | map(attribute='name') | reject('match', '^[A-Za-z0-9_.@:-]+$') | list | length == 0
    fail_msg: "SYSTEMD_SERVICE_FAILED: systemd service inputs are invalid."
    success_msg: "systemd service inputs are valid."

- name: Check systemd service enablement
  ansible.builtin.command:
    argv:
      - chroot
      - "{{ init_target_root }}"
      - /usr/bin/systemctl
      - is-enabled
      - "{{ item.name }}"
  loop: "{{ init_service_list }}"
  register: systemd_service_state
  changed_when: false
  failed_when: false
  check_mode: false

- name: Enable systemd services
  ansible.builtin.command:
    argv:
      - chroot
      - "{{ init_target_root }}"
      - /usr/bin/systemctl
      - enable
      - "{{ item.item.name }}"
  loop: "{{ systemd_service_state.results }}"
  register: systemd_service_enable
  changed_when: true
  failed_when: systemd_service_enable.rc != 0
  when:
    - not ansible_check_mode
    - item.stdout | trim != 'enabled'

- name: Recheck systemd service enablement
  ansible.builtin.command:
    argv:
      - chroot
      - "{{ init_target_root }}"
      - /usr/bin/systemctl
      - is-enabled
      - "{{ item.name }}"
  loop: "{{ init_service_list }}"
  register: systemd_service_state_after
  changed_when: false
  failed_when: false
  check_mode: false

- name: Validate systemd services are enabled
  ansible.builtin.assert:
    that:
      - item.stdout | trim == 'enabled'
    fail_msg: "SYSTEMD_SERVICE_FAILED: {{ item.item.name }} is not enabled."
    success_msg: "systemd service {{ item.item.name }} is enabled."
  loop: "{{ systemd_service_state_after.results }}"

- name: Report systemd service changes
  ansible.builtin.set_fact:
    init_services_changed: "{{ systemd_service_enable.results | default([]) | selectattr('changed') | list | length > 0 }}"
    init_service_report:
      init_system: systemd
      services: "{{ init_service_list }}"
      changed: "{{ systemd_service_enable.results | default([]) | selectattr('changed') | list | length > 0 }}"
