---
- name: Define Portage baseline facts
  ansible.builtin.set_fact:
    portage_target_root: "{{ target_mount | default('/mnt/gentoo') }}"
    portage_common_flags: "-O2 -pipe"
    portage_detected_jobs: "{{ ansible_processor_nproc | default(ansible_processor_vcpus | default(2)) | int }}"
    portage_mirror_value: "{{ portage_gentoo_mirrors | default('https://distfiles.gentoo.org') }}"
    portage_stage3_flavor: "{{ stage3_flavor | default('standard') }}"

- name: Validate Portage selector inputs
  ansible.builtin.assert:
    that:
      - profile is defined
      - profile in ['openrc', 'systemd']
      - init_system is defined
      - init_system == profile
      - stage3_variant is defined
      - stage3_variant == profile
      - portage_stage3_flavor in ['standard', 'hardened', 'musl']
    fail_msg: "PORTAGE_FAILED: profile, init system, stage3 variant, or stage3 flavor is outside the approved baseline."
    success_msg: "Portage selector inputs are approved."

- name: Derive matching Portage profile path
  ansible.builtin.set_fact:
    portage_profile_flavor_suffix: "{{ '' if portage_stage3_flavor == 'standard' else '/' ~ portage_stage3_flavor }}"
    portage_profile_init_suffix: "{{ '/systemd' if profile == 'systemd' else '' }}"

- name: Define matching Portage profile path
  ansible.builtin.set_fact:
    portage_profile_path: "default/linux/amd64/23.0{{ portage_profile_flavor_suffix }}{{ portage_profile_init_suffix }}"
    portage_profile_description: "Gentoo amd64 {{ portage_stage3_flavor }} {{ profile }} profile"

- name: Clamp Portage MAKEOPTS job count
  ansible.builtin.set_fact:
    portage_makeopts_jobs: "{{ [[portage_detected_jobs | int, 1] | max, 8] | min }}"

- name: Validate Portage baseline inputs
  ansible.builtin.assert:
    that:
      - portage_profile_path is defined
      - portage_profile_path is match('^default/linux/amd64/23\\.0((/systemd)|(/hardened(/systemd)?)|(/musl(/systemd)?))?$')
      - portage_target_root == '/mnt/gentoo'
      - portage_target_root != '/'
      - portage_mirror_value is match('^https://.+')
      - not (portage_mirror_value is search('\\s'))
    fail_msg: "PORTAGE_FAILED: Portage profile, stage3 flavor, mirror, or target root is outside the approved baseline."
    success_msg: "Portage baseline inputs are approved."

- name: Require extracted stage3 before Portage baseline
  ansible.builtin.stat:
    path: "{{ portage_target_root }}/{{ item }}"
  loop:
    - etc
    - usr
    - var
    - root
  register: portage_stage3_markers

- name: Validate extracted stage3 before Portage baseline
  ansible.builtin.assert:
    that:
      - portage_stage3_markers.results | selectattr('stat.exists') | list | length == portage_stage3_markers.results | length
    fail_msg: "PORTAGE_FAILED: stage3 markers are missing under /mnt/gentoo."
    success_msg: "Stage3 markers exist under /mnt/gentoo."

- name: Verify chroot pseudo-filesystems are mounted
  ansible.builtin.command:
    argv:
      - findmnt
      - --mountpoint
      - "{{ item }}"
      - --noheadings
      - --output
      - TARGET,FSTYPE
  loop:
    - "{{ portage_target_root }}/proc"
    - "{{ portage_target_root }}/sys"
    - "{{ portage_target_root }}/dev"
    - "{{ portage_target_root }}/run"
    - "{{ portage_target_root }}/dev/pts"
  register: portage_chroot_mounts
  changed_when: false
  failed_when: portage_chroot_mounts.rc != 0
  check_mode: false

- name: Refuse installed-system GURU repository by default
  ansible.builtin.stat:
    path: "{{ item }}"
  loop:
    - "{{ portage_target_root }}/etc/portage/repos.conf/guru.conf"
    - "{{ portage_target_root }}/var/db/repos/guru"
  register: portage_guru_paths

- name: Validate GURU remains disabled in the target system
  ansible.builtin.assert:
    that:
      - portage_guru_paths.results | selectattr('stat.exists') | list | length == 0
    fail_msg: "PORTAGE_FAILED: GURU repository is present in the target system; v1 keeps it disabled unless a later approved change requires it."
    success_msg: "GURU repository is not enabled in the target system."

- name: Ensure target Portage repos.conf directory exists
  ansible.builtin.file:
    path: "{{ portage_target_root }}/etc/portage/repos.conf"
    state: directory
    mode: "0755"
  when: not ansible_check_mode

- name: Install official Gentoo repository configuration
  ansible.builtin.copy:
    src: "{{ portage_target_root }}/usr/share/portage/config/repos.conf"
    dest: "{{ portage_target_root }}/etc/portage/repos.conf/gentoo.conf"
    remote_src: true
    mode: "0644"
    force: false
  when: not ansible_check_mode

- name: Manage conservative target make.conf
  ansible.builtin.template:
    src: make.conf.j2
    dest: "{{ portage_target_root }}/etc/portage/make.conf"
    mode: "0644"
  when: not ansible_check_mode

- name: Sync official Gentoo repository
  ansible.builtin.command:
    argv:
      - chroot
      - "{{ portage_target_root }}"
      - /usr/bin/emerge
      - --sync
      - --quiet
  register: portage_sync
  changed_when: true
  failed_when: portage_sync.rc != 0
  retries: 4
  delay: 45
  until: portage_sync.rc == 0
  when: not ansible_check_mode

- name: List available Portage profiles
  ansible.builtin.command:
    argv:
      - chroot
      - "{{ portage_target_root }}"
      - /usr/bin/eselect
      - profile
      - list
  register: portage_profile_list
  changed_when: false
  failed_when: portage_profile_list.rc != 0
  check_mode: false

- name: Validate requested Portage profile exists
  ansible.builtin.assert:
    that:
      - portage_profile_list.stdout is search((portage_profile_path | regex_escape) ~ '(\\s|$)')
    fail_msg: "PORTAGE_FAILED: requested Portage profile {{ portage_profile_path }} was not found after syncing the Gentoo repository."
    success_msg: "Requested Portage profile exists."

- name: Read current Portage profile symlink
  ansible.builtin.command:
    argv:
      - chroot
      - "{{ portage_target_root }}"
      - /usr/bin/readlink
      - -f
      - /etc/portage/make.profile
  register: portage_profile_current
  changed_when: false
  failed_when: false
  check_mode: false

- name: Determine whether Portage profile change is needed
  ansible.builtin.set_fact:
    portage_profile_needs_change: "{{ portage_profile_current.rc != 0 or not (portage_profile_current.stdout is regex('/profiles/' ~ (portage_profile_path | regex_escape) ~ '$')) }}"

- name: Select requested Portage profile
  ansible.builtin.command:
    argv:
      - chroot
      - "{{ portage_target_root }}"
      - /usr/bin/eselect
      - profile
      - set
      - "{{ portage_profile_path }}"
  register: portage_profile_set
  changed_when: true
  failed_when: portage_profile_set.rc != 0
  when:
    - not ansible_check_mode
    - portage_profile_needs_change | bool

- name: Read selected Portage profile symlink
  ansible.builtin.command:
    argv:
      - chroot
      - "{{ portage_target_root }}"
      - /usr/bin/readlink
      - -f
      - /etc/portage/make.profile
  register: portage_profile_selected
  changed_when: false
  failed_when: portage_profile_selected.rc != 0
  check_mode: false

- name: Validate selected Portage profile
  ansible.builtin.assert:
    that:
      - portage_profile_selected.stdout is regex('/profiles/' ~ (portage_profile_path | regex_escape) ~ '$')
    fail_msg: "PORTAGE_FAILED: selected Portage profile does not match {{ portage_profile_path }}."
    success_msg: "Selected Portage profile matches the requested init system and stage3 flavor."

- name: Find pending protected config file updates
  ansible.builtin.command:
    argv:
      - find
      - "{{ portage_target_root }}/etc"
      - -name
      - ._cfg????_*
      - -type
      - f
      - -print
  register: portage_pending_config_files
  changed_when: false
  failed_when: portage_pending_config_files.rc != 0
  check_mode: false

- name: Define Portage audit run id
  ansible.builtin.set_fact:
    portage_run_id: "{{ install_run_id | default(ansible_date_time.iso8601_basic_short) }}"

- name: Define Portage audit log path
  ansible.builtin.set_fact:
    portage_log_dir: "{{ project_root | default(lookup('ansible.builtin.env', 'PWD'), true) }}/logs/install-runs/{{ portage_run_id }}/portage"

- name: Create local Portage log directory
  ansible.builtin.file:
    path: "{{ portage_log_dir }}"
    state: directory
    mode: "0750"
  delegate_to: localhost
  become: false
  changed_when: false
  when: not ansible_check_mode

- name: Record Portage baseline evidence
  ansible.builtin.copy:
    dest: "{{ portage_log_dir }}/baseline.json"
    mode: "0640"
    content: |
      {
        "profile": {{ profile | to_json }},
        "init_system": {{ init_system | to_json }},
        "stage3_variant": {{ stage3_variant | to_json }},
        "stage3_flavor": {{ portage_stage3_flavor | to_json }},
        "portage_profile_path": {{ portage_profile_path | to_json }},
        "portage_profile_description": {{ portage_profile_description | default('') | to_json }},
        "selected_profile": {{ portage_profile_selected.stdout | to_json }},
        "common_flags": {{ portage_common_flags | to_json }},
        "makeopts_jobs": {{ portage_makeopts_jobs | to_json }},
        "use_flags": {{ portage_global_use_flags | to_json }},
        "accept_license": {{ portage_accept_license | to_json }},
        "gentoo_mirrors": {{ portage_mirror_value | to_json }},
        "repo_sync_rc": {{ portage_sync.rc | to_json }},
        "world_update_run": false,
        "guru_enabled": false,
        "pending_config_updates": {{ portage_pending_config_files.stdout_lines | default([]) | to_nice_json }}
      }
  delegate_to: localhost
  become: false
  changed_when: false
  when: not ansible_check_mode

- name: Build Portage baseline report
  ansible.builtin.set_fact:
    portage_report:
      changed: "{{ (not ansible_check_mode) and ((portage_sync is changed) or (portage_profile_set is defined and portage_profile_set is changed)) }}"
      profile: "{{ profile }}"
      stage3_flavor: "{{ portage_stage3_flavor }}"
      portage_profile: "{{ portage_profile_path }}"
      makeopts: "-j{{ portage_makeopts_jobs }}"
      mirrors: "{{ portage_mirror_value }}"
      world_update_run: false
      guru_enabled: false
      pending_config_updates: "{{ portage_pending_config_files.stdout_lines | default([]) }}"
      logs: "{{ portage_log_dir }}/"

- name: Print Portage baseline report
  ansible.builtin.debug:
    msg: "{{ portage_report }}"
