---
- name: Require shared disk safety report for partition plan
  ansible.builtin.assert:
    that:
      - disk_safety_report is defined
      - disk_safety_report.read_only | bool
    fail_msg: "partition-plan requires common/disk_safety to run before common/partition_plan."
    success_msg: "Shared disk safety report is available."

- name: Store partition plan disk facts from safety report
  ansible.builtin.set_fact:
    partition_plan_disk: "{{ disk_safety_disk }}"
    partition_plan_children: "{{ disk_safety_children }}"
    partition_plan_all_descendants: "{{ disk_safety_all_descendants }}"

- name: Derive read-only partition plan
  ansible.builtin.set_fact:
    partition_plan_report:
      read_only: true
      destructive_commands_run: false
      confirmation_required_now: false
      future_apply_requires_confirmation: true
      selected_disk: "{{ partition_plan_disk }}"
      existing_children: "{{ partition_plan_children }}"
      existing_descendants: "{{ partition_plan_all_descendants }}"
      would_destroy_existing_data: "{{ disk_safety_report.would_destroy_existing_data }}"
      partition_table: gpt
      planned_partitions:
        - number: 1
          purpose: efi_system_partition
          size: 512MiB
          filesystem: FAT32
          mountpoint: /boot/efi
        - number: 2
          purpose: root_filesystem
          size: remaining disk
          filesystem: "{{ install_plan_filesystem }}"
          mountpoint: /mnt/gentoo
          btrfs_mount_options: "{{ ['noatime', 'compress=zstd', 'subvol=@'] if install_plan_filesystem == 'btrfs' else [] }}"
          btrfs_subvolumes: "{{ [{'name': '@', 'mountpoint': '/mnt/gentoo'}, {'name': '@home', 'mountpoint': '/mnt/gentoo/home'}, {'name': '@var', 'mountpoint': '/mnt/gentoo/var'}, {'name': '@var_log', 'mountpoint': '/mnt/gentoo/var/log'}, {'name': '@var_cache', 'mountpoint': '/mnt/gentoo/var/cache'}, {'name': '@snapshots', 'mountpoint': '/mnt/gentoo/.snapshots'}] if install_plan_filesystem == 'btrfs' else [] }}"
      swap_partition: false
      next_step: "Review this output before any future destructive partition or format target is implemented."

- name: Print read-only partition plan
  ansible.builtin.debug:
    msg: "{{ partition_plan_report }}"
