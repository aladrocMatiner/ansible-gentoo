---
- name: Require explicit install disk for disk safety
  ansible.builtin.assert:
    that:
      - install_disk is defined
      - install_disk | string | length > 0
    fail_msg: "DISK_UNSAFE: INSTALL_DISK/install_disk is required and has no default."
    success_msg: "INSTALL_DISK was provided explicitly."

- name: Reject unsafe install disk syntax
  ansible.builtin.assert:
    that:
      - install_disk is match('^/dev/.+')
      - install_disk not in ['/dev', '/dev/']
      - "'..' not in install_disk"
      - "'=' not in install_disk"
      - "',' not in install_disk"
      - "';' not in install_disk"
      - "'|' not in install_disk"
      - "'&' not in install_disk"
      - "' ' not in install_disk"
      - "'*' not in install_disk"
      - "'?' not in install_disk"
      - "'[' not in install_disk"
      - "']' not in install_disk"
    fail_msg: "DISK_UNSAFE: INSTALL_DISK={{ install_disk }} contains unsafe syntax."
    success_msg: "INSTALL_DISK syntax is conservative."

- name: Require destructive confirmation when requested
  ansible.builtin.assert:
    that:
      - confirm_wipe_disk is defined
      - confirm_wipe_disk == "yes"
    fail_msg: "DESTRUCTIVE_CONFIRMATION_MISSING: destructive disk workflows require I_UNDERSTAND_THIS_WIPES_DISK=yes."
    success_msg: "Destructive confirmation variable is present."
  when: disk_safety_require_confirmation | default(false) | bool

- name: Match selected disk for disk safety
  ansible.builtin.set_fact:
    disk_safety_matching_disks: >-
      {{
        disk_detection_report.blockdevices
        | selectattr('path', 'equalto', install_disk)
        | list
      }}

- name: Require selected disk to match exactly one detected disk
  ansible.builtin.assert:
    that:
      - disk_safety_matching_disks | length == 1
    fail_msg: "DISK_UNSAFE: INSTALL_DISK={{ install_disk }} must match exactly one detected disk."
    success_msg: "INSTALL_DISK={{ install_disk }} matched exactly one detected disk."

- name: Store selected disk identity for safety gates
  ansible.builtin.set_fact:
    disk_safety_disk: "{{ disk_safety_matching_disks | first }}"

- name: Require selected path to be a disk
  ansible.builtin.assert:
    that:
      - disk_safety_disk.type == "disk"
    fail_msg: "DISK_UNSAFE: INSTALL_DISK={{ install_disk }} is type {{ disk_safety_disk.type | default('unknown') }}, expected disk."
    success_msg: "Selected install path is a disk."

- name: Collect selected disk child partitions
  ansible.builtin.set_fact:
    disk_safety_children: "{{ disk_safety_disk.children | default([]) }}"

- name: Collect selected disk mountpoints
  ansible.builtin.set_fact:
    disk_safety_disk_mountpoints: "{{ disk_safety_disk.mountpoints | default([]) | select('string') | list }}"

- name: Fail if selected disk has mountpoints
  ansible.builtin.assert:
    that:
      - disk_safety_disk_mountpoints | length == 0
    fail_msg: "DISK_UNSAFE: selected disk has mountpoints: {{ disk_safety_disk_mountpoints }}"
    success_msg: "Selected disk itself has no mountpoints."

- name: Read selected disk descendants as a flat inventory
  ansible.builtin.command:
    argv:
      - lsblk
      - --json
      - --list
      - --bytes
      - --output
      - NAME,PATH,TYPE,SIZE,MODEL,SERIAL,FSTYPE,MOUNTPOINTS,UUID,PARTTYPENAME
      - "{{ install_disk }}"
  register: disk_safety_lsblk_flat
  changed_when: false
  check_mode: false

- name: Parse selected disk flat inventory
  ansible.builtin.set_fact:
    disk_safety_flat_report: "{{ disk_safety_lsblk_flat.stdout | from_json }}"

- name: Collect selected disk descendants
  ansible.builtin.set_fact:
    disk_safety_all_descendants: >-
      {{
        disk_safety_flat_report.blockdevices
        | rejectattr('path', 'equalto', install_disk)
        | list
      }}
    disk_safety_mounted_descendants: []

- name: Add mounted selected disk descendants
  ansible.builtin.set_fact:
    disk_safety_mounted_descendants: "{{ disk_safety_mounted_descendants + [item] }}"
  loop: "{{ disk_safety_all_descendants }}"
  when: item.mountpoints | default([]) | select('string') | list | length > 0

- name: Fail if selected disk has mounted descendants
  ansible.builtin.assert:
    that:
      - disk_safety_mounted_descendants | length == 0
    fail_msg: "DISK_UNSAFE: selected disk has mounted descendants: {{ disk_safety_mounted_descendants }}"
    success_msg: "Selected disk has no mounted descendants."
  when: not disk_safety_allow_mounted_descendants | default(false) | bool

- name: Report allowed mounted descendants
  ansible.builtin.debug:
    msg: "Mounted descendants are allowed for this workflow and must be validated by the caller: {{ disk_safety_mounted_descendants }}"
  when:
    - disk_safety_allow_mounted_descendants | default(false) | bool
    - disk_safety_mounted_descendants | length > 0

- name: Normalize current disk safety checkpoint facts
  ansible.builtin.set_fact:
    disk_safety_current_descendant_state: []
    disk_safety_current_checkpoint:
      install_disk: "{{ install_disk }}"
      selected_disk:
        path: "{{ disk_safety_disk.path | default('') }}"
        model: "{{ disk_safety_disk.model | default('') }}"
        serial: "{{ disk_safety_disk.serial | default('') }}"
        size: "{{ disk_safety_disk.size | default('') }}"
        type: "{{ disk_safety_disk.type | default('') }}"

- name: Build normalized current descendant state
  ansible.builtin.set_fact:
    disk_safety_current_descendant_state: >-
      {{
        disk_safety_current_descendant_state
        + [
            {
              'path': item.path | default(''),
              'type': item.type | default(''),
              'size': item.size | default(''),
              'fstype': item.fstype | default(''),
              'uuid': item.uuid | default(''),
              'parttypename': item.parttypename | default(''),
              'mountpoints': item.mountpoints | default([]) | select('string') | list
            }
          ]
      }}
  loop: "{{ disk_safety_all_descendants }}"

- name: Sort normalized current descendant state
  ansible.builtin.set_fact:
    disk_safety_current_descendant_state: "{{ disk_safety_current_descendant_state | sort(attribute='path') }}"

- name: Complete normalized current disk safety checkpoint facts
  ansible.builtin.set_fact:
    disk_safety_current_checkpoint: "{{ disk_safety_current_checkpoint | combine({'descendants': disk_safety_current_descendant_state}, recursive=true) }}"

- name: Initialize resume checkpoint inputs
  ansible.builtin.set_fact:
    disk_safety_resume_checkpoint_file_path: "{{ disk_safety_resume_checkpoint_file | default('') | string }}"
    disk_safety_resume_checkpoint_inline: "{{ disk_safety_resume_checkpoint | default({}) }}"
    disk_safety_resume_checkpoint_loaded: {}

- name: Load disk safety resume checkpoint file
  ansible.builtin.include_vars:
    file: "{{ disk_safety_resume_checkpoint_file_path }}"
    name: disk_safety_resume_checkpoint_from_file
  when: disk_safety_resume_checkpoint_file_path | length > 0

- name: Store loaded disk safety resume checkpoint file data
  ansible.builtin.set_fact:
    disk_safety_resume_checkpoint_loaded: "{{ disk_safety_resume_checkpoint_from_file | default({}) }}"

- name: Select effective disk safety resume checkpoint
  ansible.builtin.set_fact:
    disk_safety_resume_checkpoint_enabled: >-
      {{
        (disk_safety_resume_checkpoint_required | default(false) | bool)
        or (disk_safety_resume_checkpoint_file_path | length > 0)
        or (disk_safety_resume_checkpoint_inline | length > 0)
      }}
    disk_safety_resume_checkpoint_effective: >-
      {{
        disk_safety_resume_checkpoint_inline
        if (disk_safety_resume_checkpoint_inline | length > 0)
        else (
          disk_safety_resume_checkpoint_loaded.disk_safety_resume_checkpoint
          | default(disk_safety_resume_checkpoint_loaded.install_state_checkpoint
          | default(disk_safety_resume_checkpoint_loaded.disk_safety
          | default(disk_safety_resume_checkpoint_loaded)))
        )
      }}

- name: Require resume checkpoint when resume validation is requested
  ansible.builtin.assert:
    that:
      - disk_safety_resume_checkpoint_effective is mapping
      - disk_safety_resume_checkpoint_effective | length > 0
    fail_msg: "RESUME_CHECKPOINT_INVALID: destructive resume requires a non-empty disk safety checkpoint."
    success_msg: "Resume checkpoint was provided for disk safety validation."
  when: disk_safety_resume_checkpoint_enabled | bool

- name: Normalize resume checkpoint fields
  ansible.builtin.set_fact:
    disk_safety_checkpoint_selected_disk: >-
      {{
        disk_safety_resume_checkpoint_effective.selected_disk
        | default(disk_safety_resume_checkpoint_effective.disk | default({}))
      }}
    disk_safety_checkpoint_descendants: >-
      {{
        disk_safety_resume_checkpoint_effective.descendants
        | default(disk_safety_resume_checkpoint_effective.existing_descendants | default([]))
      }}
    disk_safety_checkpoint_descendant_state: []
  when: disk_safety_resume_checkpoint_enabled | bool

- name: Require resume checkpoint disk and descendant facts
  ansible.builtin.assert:
    that:
      - disk_safety_checkpoint_selected_disk is mapping
      - disk_safety_checkpoint_selected_disk.path is defined
      - disk_safety_checkpoint_selected_disk.size is defined
      - disk_safety_checkpoint_descendants is iterable
    fail_msg: "RESUME_CHECKPOINT_INVALID: checkpoint must include selected disk path, disk size, and descendant block state."
    success_msg: "Resume checkpoint contains disk identity and descendant facts."
  when: disk_safety_resume_checkpoint_enabled | bool

- name: Build normalized resume checkpoint descendant state
  ansible.builtin.set_fact:
    disk_safety_checkpoint_descendant_state: >-
      {{
        disk_safety_checkpoint_descendant_state
        + [
            {
              'path': item.path | default(''),
              'type': item.type | default(''),
              'size': item.size | default(''),
              'fstype': item.fstype | default(''),
              'uuid': item.uuid | default(''),
              'parttypename': item.parttypename | default(''),
              'mountpoints': item.mountpoints | default([]) | select('string') | list
            }
          ]
      }}
  loop: "{{ disk_safety_checkpoint_descendants }}"
  when: disk_safety_resume_checkpoint_enabled | bool

- name: Sort normalized resume checkpoint descendant state
  ansible.builtin.set_fact:
    disk_safety_checkpoint_descendant_state: "{{ disk_safety_checkpoint_descendant_state | sort(attribute='path') }}"
  when: disk_safety_resume_checkpoint_enabled | bool

- name: Compare resume checkpoint disk identity
  ansible.builtin.assert:
    that:
      - disk_safety_checkpoint_selected_disk.path == disk_safety_current_checkpoint.selected_disk.path
      - disk_safety_checkpoint_selected_disk.size | string == disk_safety_current_checkpoint.selected_disk.size | string
      - disk_safety_current_checkpoint.selected_disk.type == "disk"
    fail_msg: "RESUME_CHECKPOINT_MISMATCH: current install disk identity does not match the recorded checkpoint."
    success_msg: "Resume checkpoint disk path and size match current disk facts."
  when: disk_safety_resume_checkpoint_enabled | bool

- name: Compare resume checkpoint disk model when recorded
  ansible.builtin.assert:
    that:
      - disk_safety_checkpoint_selected_disk.model == disk_safety_current_checkpoint.selected_disk.model
    fail_msg: "RESUME_CHECKPOINT_MISMATCH: current disk model does not match the recorded checkpoint."
    success_msg: "Resume checkpoint disk model matches current disk facts."
  when:
    - disk_safety_resume_checkpoint_enabled | bool
    - disk_safety_checkpoint_selected_disk.model is defined
    - disk_safety_checkpoint_selected_disk.model | string | length > 0

- name: Compare resume checkpoint disk serial when recorded
  ansible.builtin.assert:
    that:
      - disk_safety_checkpoint_selected_disk.serial == disk_safety_current_checkpoint.selected_disk.serial
    fail_msg: "RESUME_CHECKPOINT_MISMATCH: current disk serial does not match the recorded checkpoint."
    success_msg: "Resume checkpoint disk serial matches current disk facts."
  when:
    - disk_safety_resume_checkpoint_enabled | bool
    - disk_safety_checkpoint_selected_disk.serial is defined
    - disk_safety_checkpoint_selected_disk.serial | string | length > 0

- name: Compare resume checkpoint partition, filesystem, UUID, and mount state
  ansible.builtin.assert:
    that:
      - disk_safety_checkpoint_descendant_state == disk_safety_current_checkpoint.descendants
    fail_msg: "RESUME_CHECKPOINT_MISMATCH: current partition, filesystem UUID, or mount state differs from the recorded checkpoint."
    success_msg: "Resume checkpoint descendant block state matches current disk facts."
  when: disk_safety_resume_checkpoint_enabled | bool

- name: Compare resume checkpoint profile when recorded
  ansible.builtin.assert:
    that:
      - profile is defined
      - disk_safety_resume_checkpoint_effective.profile == profile
    fail_msg: "RESUME_CHECKPOINT_MISMATCH: current PROFILE/profile differs from the recorded checkpoint."
    success_msg: "Resume checkpoint profile matches current profile."
  when:
    - disk_safety_resume_checkpoint_enabled | bool
    - disk_safety_resume_checkpoint_effective.profile is defined

- name: Compare resume checkpoint filesystem when recorded
  ansible.builtin.assert:
    that:
      - filesystem is defined
      - disk_safety_resume_checkpoint_effective.filesystem == filesystem
    fail_msg: "RESUME_CHECKPOINT_MISMATCH: current FILESYSTEM/filesystem differs from the recorded checkpoint."
    success_msg: "Resume checkpoint filesystem matches current filesystem."
  when:
    - disk_safety_resume_checkpoint_enabled | bool
    - disk_safety_resume_checkpoint_effective.filesystem is defined

- name: Build disk safety report
  ansible.builtin.set_fact:
    disk_safety_report:
      read_only: true
      destructive_commands_run: false
      confirmation_required: "{{ disk_safety_require_confirmation | default(false) | bool }}"
      confirmation_present: "{{ confirm_wipe_disk | default('') == 'yes' }}"
      selected_disk: "{{ disk_safety_disk }}"
      existing_children: "{{ disk_safety_children }}"
      existing_descendants: "{{ disk_safety_all_descendants }}"
      mounted_descendants: "{{ disk_safety_mounted_descendants }}"
      current_checkpoint: "{{ disk_safety_current_checkpoint }}"
      resume_checkpoint_checked: "{{ disk_safety_resume_checkpoint_enabled | bool }}"
      would_destroy_existing_data: "{{ (disk_safety_children | length > 0) or (disk_safety_disk.fstype is defined and disk_safety_disk.fstype not in [none, '']) }}"

- name: Print disk safety report
  ansible.builtin.debug:
    msg: "{{ disk_safety_report }}"
