---
- name: Define desktop login common facts
  ansible.builtin.set_fact:
    desktop_login_common_action: "{{ desktop_login_action | default('install') }}"
    desktop_login_common_manager: "{{ desktop_login_manager | default(desktop_display_manager | default('none')) }}"
    desktop_login_common_display_manager: "{{ desktop_display_manager | default('none') }}"
    desktop_login_common_sessions_raw: "{{ desktop_login_sessions | default('installed') }}"
    desktop_login_common_default_session_input: "{{ desktop_login_default_session | default('') }}"
    desktop_login_common_enable_service: "{{ desktop_login_enable_service | default(true) | bool }}"
    desktop_login_common_confirmation: "{{ desktop_login_confirmation | default('') }}"
    desktop_login_common_confirmation_ok: "{{ desktop_login_confirmation | default('') == 'yes' or desktop_login_confirmation | default(false) is sameas true }}"

- name: Validate desktop login common inputs
  ansible.builtin.assert:
    that:
      - desktop_login_common_action in ['plan', 'install', 'validate']
      - desktop_login_common_manager in desktop_login_supported_managers
      - desktop_login_common_display_manager in desktop_login_supported_managers
      - desktop_login_common_manager == desktop_login_common_display_manager
      - desktop_login_common_enable_service is boolean
      - desktop_common_user_home is defined
      - desktop_common_user_group_fields is defined
    fail_msg: "DESKTOP_LOGIN_FAILED: desktop login manager inputs are invalid."
    success_msg: "Desktop login manager inputs are valid."

- name: Require explicit login manager confirmation for install
  ansible.builtin.assert:
    that:
      - desktop_login_common_confirmation_ok | bool
    fail_msg: "DESKTOP_LOGIN_FAILED: I_UNDERSTAND_DESKTOP_LOGIN_MANAGER_CHANGES=yes is required before enabling a post-install login manager."
    success_msg: "Desktop login manager confirmation is present."
  when:
    - desktop_login_common_action == 'install'
    - desktop_login_common_manager != 'none'
    - desktop_login_common_enable_service

- name: Normalize requested desktop login sessions
  ansible.builtin.set_fact:
    desktop_login_common_requested_sessions: >-
      {{
        []
        if desktop_login_common_sessions_raw == 'installed'
        else desktop_login_common_sessions_raw.split(',') | map('trim') | reject('equalto', '') | list
      }}
    desktop_login_common_session_policy: "{{ 'installed' if desktop_login_common_sessions_raw == 'installed' else 'explicit' }}"

- name: Validate requested desktop login sessions
  ansible.builtin.assert:
    that:
      - desktop_login_common_requested_sessions | difference(desktop_login_supported_sessions) | length == 0
      - desktop_login_common_default_session_input == '' or desktop_login_common_default_session_input in desktop_login_supported_sessions
    fail_msg: "DESKTOP_LOGIN_FAILED: requested login sessions must be allowlisted desktop profiles."
    success_msg: "Requested login sessions are valid."

- name: Check available session commands
  ansible.builtin.command:
    argv: "{{ ['/bin/sh', '-c', 'for command_name do command -v \"$command_name\" >/dev/null 2>&1 && exit 0; done; exit 1', 'desktop-login-command-check'] + item.value.validation_commands }}"
  loop: "{{ desktop_login_session_definitions | dict2items }}"
  register: desktop_login_common_session_commands
  changed_when: false
  failed_when: false
  check_mode: false

- name: Build available desktop login session list
  ansible.builtin.set_fact:
    desktop_login_common_available_sessions: "{{ (desktop_login_common_available_sessions | default([])) + ([item.item.key] if item.rc == 0 else []) }}"
  loop: "{{ desktop_login_common_session_commands.results }}"

- name: Define selected desktop login sessions
  ansible.builtin.set_fact:
    desktop_login_common_selected_sessions: >-
      {{
        desktop_login_common_available_sessions | default([])
        if desktop_login_common_session_policy == 'installed'
        else desktop_login_common_requested_sessions
      }}

- name: Require selected desktop login sessions to be available
  ansible.builtin.assert:
    that:
      - desktop_login_common_selected_sessions | length > 0
      - desktop_login_common_selected_sessions | difference(desktop_login_common_available_sessions | default([])) | length == 0
    fail_msg: >-
      DESKTOP_LOGIN_FAILED: requested desktop login sessions are unavailable.
      Available sessions: {{ desktop_login_common_available_sessions | default([]) | join(', ') }}.
      Requested sessions: {{ desktop_login_common_selected_sessions | join(', ') }}.
    success_msg: "Selected desktop login sessions are available."
  when: desktop_login_common_manager != 'none'

- name: Define default desktop login session
  ansible.builtin.set_fact:
    desktop_login_common_default_session: >-
      {{
        desktop_login_common_default_session_input
        if desktop_login_common_default_session_input | length > 0
        else (desktop_login_common_selected_sessions | first | default(''))
      }}

- name: Validate default desktop login session
  ansible.builtin.assert:
    that:
      - desktop_login_common_manager == 'none' or desktop_login_common_default_session in desktop_login_common_selected_sessions
    fail_msg: "DESKTOP_LOGIN_FAILED: DESKTOP_LOGIN_DEFAULT_SESSION must be one of the selected login sessions."
    success_msg: "Default desktop login session is valid."

- name: Define managed desktop login session entries
  ansible.builtin.set_fact:
    desktop_login_common_managed_sessions: "{{ (desktop_login_common_managed_sessions | default([])) + [desktop_login_session_definitions[item] | combine({'name': item})] }}"
  loop: "{{ desktop_login_common_selected_sessions }}"
  when: desktop_login_common_manager != 'none'

- name: Report desktop login manager plan
  ansible.builtin.debug:
    msg:
      action: "{{ desktop_login_common_action }}"
      manager: "{{ desktop_login_common_manager }}"
      display_manager: "{{ desktop_login_common_display_manager }}"
      session_policy: "{{ desktop_login_common_session_policy }}"
      available_sessions: "{{ desktop_login_common_available_sessions | default([]) }}"
      selected_sessions: "{{ desktop_login_common_selected_sessions }}"
      default_session: "{{ desktop_login_common_default_session }}"
      enable_service: "{{ desktop_login_common_enable_service }}"
      dispatcher: "{{ desktop_login_dispatcher_path }}"
      managed_xsessions: "/usr/share/xsessions"
      managed_wayland_sessions: "/usr/share/wayland-sessions"
      service_confirmation_required: "{{ desktop_login_common_manager != 'none' and desktop_login_common_enable_service }}"
      destructive_install_commands_run: false

- name: Ensure desktop login session directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  become: true
  loop:
    - /usr/local/bin
    - /usr/share/xsessions
    - /usr/share/wayland-sessions
  when:
    - desktop_login_common_action == 'install'
    - desktop_login_common_manager != 'none'
    - not ansible_check_mode

- name: Install desktop login session dispatcher
  ansible.builtin.template:
    src: gentoo-ai-desktop-session.j2
    dest: "{{ desktop_login_dispatcher_path }}"
    owner: root
    group: root
    mode: "0755"
  become: true
  when:
    - desktop_login_common_action == 'install'
    - desktop_login_common_manager != 'none'
    - not ansible_check_mode

- name: Install desktop login session entries
  ansible.builtin.template:
    src: desktop-session.desktop.j2
    dest: "{{ '/usr/share/xsessions' if item.type == 'x11' else '/usr/share/wayland-sessions' }}/{{ item.filename }}"
    owner: root
    group: root
    mode: "0644"
  become: true
  loop: "{{ desktop_login_common_managed_sessions | default([]) }}"
  when:
    - desktop_login_common_action == 'install'
    - desktop_login_common_manager != 'none'
    - not ansible_check_mode

- name: Check desktop login dispatcher
  ansible.builtin.stat:
    path: "{{ desktop_login_dispatcher_path }}"
  register: desktop_login_common_dispatcher
  when:
    - desktop_login_common_action in ['install', 'validate']
    - desktop_login_common_manager != 'none'

- name: Check desktop login session entries
  ansible.builtin.stat:
    path: "{{ '/usr/share/xsessions' if item.type == 'x11' else '/usr/share/wayland-sessions' }}/{{ item.filename }}"
  loop: "{{ desktop_login_common_managed_sessions | default([]) }}"
  register: desktop_login_common_session_files
  when:
    - desktop_login_common_action in ['install', 'validate']
    - desktop_login_common_manager != 'none'

- name: Validate desktop login shared state
  ansible.builtin.assert:
    that:
      - desktop_login_common_dispatcher.stat.exists | default(false)
      - desktop_login_common_dispatcher.stat.isreg | default(false)
      - desktop_login_common_dispatcher.stat.mode | default('') == '0755'
      - desktop_login_common_session_files.results | default([]) | selectattr('stat.exists') | list | length == desktop_login_common_managed_sessions | default([]) | length
    fail_msg: "DESKTOP_LOGIN_FAILED: session dispatcher or generated session entries are missing."
    success_msg: "Desktop login shared state validates successfully."
  when:
    - desktop_login_common_action in ['install', 'validate']
    - desktop_login_common_manager != 'none'

- name: Check OpenRC greetd state when no login manager is requested
  ansible.builtin.command:
    argv:
      - rc-update
      - show
      - default
  register: desktop_login_common_none_openrc
  changed_when: false
  failed_when: false
  check_mode: false
  when:
    - desktop_login_common_action == 'validate'
    - desktop_login_common_manager == 'none'
    - ansible_service_mgr | default('') != 'systemd'

- name: Check systemd greetd state when no login manager is requested
  ansible.builtin.command:
    argv:
      - systemctl
      - is-enabled
      - greetd.service
  register: desktop_login_common_none_systemd
  changed_when: false
  failed_when: false
  check_mode: false
  when:
    - desktop_login_common_action == 'validate'
    - desktop_login_common_manager == 'none'
    - ansible_service_mgr | default('') == 'systemd'

- name: Validate no managed login manager state
  ansible.builtin.assert:
    that:
      - >-
        (
          ansible_service_mgr | default('') == 'systemd'
          and desktop_login_common_none_systemd.rc | default(1) != 0
        )
        or
        (
          ansible_service_mgr | default('') != 'systemd'
          and desktop_login_common_none_openrc.stdout | default('') is not search('(^|\\n)\\s*greetd\\s')
        )
    fail_msg: "DESKTOP_LOGIN_FAILED: greetd appears enabled while DESKTOP_DISPLAY_MANAGER=none was requested."
    success_msg: "No project-managed login manager is enabled."
  when:
    - desktop_login_common_action == 'validate'
    - desktop_login_common_manager == 'none'
