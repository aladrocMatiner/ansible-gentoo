---
- name: Validate Wayland profile inputs
  ansible.builtin.assert:
    that:
      - desktop_common_profile == desktop_wayland_profile_name
      - desktop_common_session_start == 'manual'
      - desktop_common_display_manager == 'none'
      - desktop_common_package_source == 'gentoo'
      - desktop_wayland_core_packages is defined
      - desktop_wayland_validation_commands is defined
      - desktop_wayland_config_dir is defined
      - desktop_wayland_config_template is defined
      - desktop_wayland_config_dest is defined
      - desktop_wayland_session_command is defined
    fail_msg: "DESKTOP_FAILED: Wayland profile inputs are invalid for {{ desktop_wayland_profile_name }}."
    success_msg: "Wayland profile inputs are valid for {{ desktop_wayland_profile_name }}."

- name: Require experimental acknowledgement for experimental Wayland install
  ansible.builtin.assert:
    that:
      - desktop_common_experimental_ok == 'yes'
    fail_msg: "DESKTOP_FAILED: DESKTOP_EXPERIMENTAL_OK=yes is required before installing experimental profile {{ desktop_wayland_profile_name }}."
    success_msg: "Experimental desktop acknowledgement is present."
  when:
    - desktop_common_action == 'install'
    - desktop_wayland_requires_experimental | bool

- name: Build Wayland package request
  ansible.builtin.set_fact:
    desktop_wayland_requested_packages: >-
      {{
        (
          desktop_wayland_core_packages
          + (desktop_wayland_recommended_packages | default([]) if desktop_common_install_recommends == 'yes' else [])
          + (desktop_wayland_portal_packages | default([]) if desktop_common_enable_portal == 'yes' else [])
          + (desktop_wayland_xwayland_packages | default([]) if desktop_common_enable_xwayland == 'yes' else [])
        ) | unique | list
      }}

- name: Check Wayland package availability
  ansible.builtin.command:
    argv:
      - portageq
      - match
      - /
      - "{{ item }}"
  loop: "{{ desktop_wayland_requested_packages }}"
  register: desktop_wayland_package_availability
  changed_when: false
  failed_when: false
  check_mode: false
  when: desktop_common_action in ['plan', 'install']

- name: Store unavailable Wayland packages
  ansible.builtin.set_fact:
    desktop_wayland_unavailable_packages: "{{ desktop_wayland_package_availability.results | default([]) | selectattr('rc', 'ne', 0) | map(attribute='item') | list }}"
  when: desktop_common_action in ['plan', 'install']

- name: Require Wayland packages to exist in configured Gentoo repository
  ansible.builtin.assert:
    that:
      - desktop_wayland_unavailable_packages | length == 0
    fail_msg: "DESKTOP_FAILED: requested {{ desktop_wayland_label }} packages are unavailable from DESKTOP_PACKAGE_SOURCE=gentoo: {{ desktop_wayland_unavailable_packages | join(', ') }}. The role will not add overlays, unmask packages, clone source, install binaries, or bypass Portage package policy."
    success_msg: "Requested {{ desktop_wayland_label }} packages are available from Gentoo package source."
  when: desktop_common_action in ['plan', 'install']

- name: Check installed Wayland packages
  ansible.builtin.command:
    argv:
      - portageq
      - has_version
      - /
      - "{{ item }}"
  loop: "{{ desktop_wayland_requested_packages }}"
  register: desktop_wayland_package_state
  changed_when: false
  failed_when: false
  check_mode: false

- name: Store missing Wayland packages
  ansible.builtin.set_fact:
    desktop_wayland_missing_packages: "{{ desktop_wayland_package_state.results | selectattr('rc', 'ne', 0) | map(attribute='item') | list }}"

- name: Report Wayland desktop package plan
  ansible.builtin.debug:
    msg:
      action: "{{ desktop_common_action }}"
      profile: "{{ desktop_wayland_profile_name }}"
      label: "{{ desktop_wayland_label }}"
      package_source: "{{ desktop_common_package_source }}"
      experimental_required: "{{ desktop_wayland_requires_experimental }}"
      experimental_ok: "{{ desktop_common_experimental_ok }}"
      packages: "{{ desktop_wayland_requested_packages }}"
      missing_packages: "{{ desktop_wayland_missing_packages }}"
      unavailable_packages: "{{ desktop_wayland_unavailable_packages | default([]) }}"
      session_file: "{{ desktop_wayland_session_file }}"
      config_file: "{{ desktop_wayland_config_dest }}"
      display_manager: none
      source_or_overlay_actions_allowed: false

- name: Install Wayland desktop packages
  ansible.builtin.command:
    argv: "{{ ['emerge', '--verbose', '--noreplace', '--changed-use'] + desktop_wayland_requested_packages }}"
  become: true
  register: desktop_wayland_emerge
  changed_when: desktop_wayland_missing_packages | length > 0
  failed_when: desktop_wayland_emerge.rc != 0
  retries: 2
  delay: 30
  until: desktop_wayland_emerge.rc == 0
  when:
    - desktop_common_action == 'install'
    - not ansible_check_mode
    - desktop_wayland_missing_packages | length > 0

- name: Ensure Wayland config directory exists
  ansible.builtin.file:
    path: "{{ desktop_wayland_config_dir }}"
    state: directory
    owner: "{{ desktop_common_user }}"
    group: "{{ desktop_common_user_group_fields[0] }}"
    mode: "0755"
  become: true
  when:
    - desktop_common_action == 'install'
    - not ansible_check_mode

- name: Ensure managed session directory exists
  ansible.builtin.file:
    path: "{{ desktop_common_user_home }}/.config/gentoo-ai-installer"
    state: directory
    owner: "{{ desktop_common_user }}"
    group: "{{ desktop_common_user_group_fields[0] }}"
    mode: "0755"
  become: true
  when:
    - desktop_common_action == 'install'
    - not ansible_check_mode

- name: Install Wayland session launcher
  ansible.builtin.template:
    src: wayland-session.sh.j2
    dest: "{{ desktop_wayland_session_file }}"
    owner: "{{ desktop_common_user }}"
    group: "{{ desktop_common_user_group_fields[0] }}"
    mode: "0755"
  become: true
  when:
    - desktop_common_action == 'install'
    - not ansible_check_mode

- name: Install Wayland compositor config
  ansible.builtin.template:
    src: "{{ desktop_wayland_config_template }}"
    dest: "{{ desktop_wayland_config_dest }}"
    owner: "{{ desktop_common_user }}"
    group: "{{ desktop_common_user_group_fields[0] }}"
    mode: "0644"
  become: true
  when:
    - desktop_common_action == 'install'
    - not ansible_check_mode

- name: Recheck installed Wayland packages
  ansible.builtin.command:
    argv:
      - portageq
      - has_version
      - /
      - "{{ item }}"
  loop: "{{ desktop_wayland_requested_packages }}"
  register: desktop_wayland_package_state_after
  changed_when: false
  failed_when: desktop_wayland_package_state_after.rc != 0
  check_mode: false
  when: desktop_common_action in ['install', 'validate']

- name: Check Wayland validation command alternatives
  ansible.builtin.command:
    argv: "{{ ['/bin/sh', '-c', 'for command_name do command -v \"$command_name\" >/dev/null 2>&1 && exit 0; done; exit 1', 'desktop-command-check'] + item.commands }}"
  loop: "{{ desktop_wayland_validation_commands }}"
  register: desktop_wayland_commands
  changed_when: false
  failed_when: false
  check_mode: false
  when: desktop_common_action in ['install', 'validate']

- name: Check Wayland session files
  ansible.builtin.stat:
    path: "{{ item }}"
  loop:
    - "{{ desktop_wayland_session_file }}"
    - "{{ desktop_wayland_config_dest }}"
  register: desktop_wayland_session_files
  when: desktop_common_action in ['install', 'validate']

- name: Read Wayland session launcher
  ansible.builtin.slurp:
    src: "{{ desktop_wayland_session_file }}"
  register: desktop_wayland_session_launcher
  when:
    - desktop_common_action in ['install', 'validate']
    - desktop_wayland_session_files.results[0].stat.exists | default(false)

- name: Validate Wayland desktop state
  ansible.builtin.assert:
    that:
      - desktop_wayland_package_state_after.results | default([]) | selectattr('rc', 'ne', 0) | list | length == 0
      - desktop_wayland_commands.results | default([]) | selectattr('rc', 'ne', 0) | list | length == 0
      - desktop_wayland_session_files.results | default([]) | selectattr('stat.exists') | list | length == 2
      - (desktop_wayland_session_launcher.content | default('') | b64decode) is search(desktop_wayland_session_match)
      - desktop_common_display_manager_disabled | bool
    fail_msg: "DESKTOP_FAILED: {{ desktop_wayland_label }} packages, commands, session files, or display-manager policy do not match the requested profile."
    success_msg: "{{ desktop_wayland_label }} desktop profile validates successfully."
  when: desktop_common_action in ['install', 'validate']

- name: Report Wayland desktop result
  ansible.builtin.debug:
    msg:
      status: "{{ 'planned' if desktop_common_action == 'plan' else 'validated' }}"
      profile: "{{ desktop_wayland_profile_name }}"
      label: "{{ desktop_wayland_label }}"
      user: "{{ desktop_common_user }}"
      packages: "{{ desktop_wayland_requested_packages }}"
      missing_before: "{{ desktop_wayland_missing_packages }}"
      session_file: "{{ desktop_wayland_session_file }}"
      config_file: "{{ desktop_wayland_config_dest }}"
      start_method: manual
      display_manager: none
      source_or_overlay_actions_run: false
      destructive_install_commands_run: false
