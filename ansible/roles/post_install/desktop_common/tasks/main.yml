---
- name: Define desktop common facts
  ansible.builtin.set_fact:
    desktop_common_action: "{{ desktop_action | default('install') }}"
    desktop_common_profile: "{{ desktop_profile | default('i3-x11') }}"
    desktop_common_user: "{{ desktop_user | default('') }}"
    desktop_common_install_recommends: "{{ desktop_install_recommends | default(true) | bool }}"
    desktop_common_enable_portal: "{{ desktop_enable_portal | default(true) | bool }}"
    desktop_common_enable_xwayland: "{{ desktop_enable_xwayland | default(true) | bool }}"
    desktop_common_experimental_ok: "{{ desktop_experimental_ok | default(false) | bool }}"
    desktop_common_package_source: "{{ desktop_package_source | default('gentoo') }}"
    desktop_common_display_manager: "{{ desktop_display_manager | default('none') }}"
    desktop_common_session_start: "{{ desktop_session_start | default('startx') }}"
    desktop_common_privilege_tool: "{{ desktop_privilege_tool | default('sudo') }}"

- name: Validate desktop common inputs
  ansible.builtin.assert:
    that:
      - desktop_common_action in ['plan', 'install', 'validate']
      - desktop_common_profile in desktop_supported_profiles
      - desktop_common_user is match('^[a-z_][a-z0-9_-]{0,31}\\$?$')
      - desktop_common_install_recommends is boolean
      - desktop_common_enable_portal is boolean
      - desktop_common_enable_xwayland is boolean
      - desktop_common_experimental_ok is boolean
      - desktop_common_package_source == 'gentoo'
      - desktop_common_display_manager in ['none', 'greetd']
      - desktop_common_session_start in ['startx', 'manual']
      - desktop_common_privilege_tool == 'sudo'
    fail_msg: "DESKTOP_FAILED: desktop profile, user, session, or privilege inputs are invalid."
    success_msg: "Desktop profile inputs are valid."

- name: Validate desktop session policy
  ansible.builtin.assert:
    that:
      - desktop_common_profile != 'i3-x11' or desktop_common_session_start == 'startx'
      - desktop_common_profile == 'i3-x11' or desktop_common_session_start == 'manual'
    fail_msg: "DESKTOP_FAILED: i3 requires DESKTOP_SESSION_START=startx; Wayland profiles require DESKTOP_SESSION_START=manual."
    success_msg: "Desktop session policy is valid for selected profile."

- name: Read target root filesystem type
  ansible.builtin.command:
    argv:
      - findmnt
      - --mountpoint
      - /
      - --noheadings
      - --output
      - FSTYPE,SOURCE
  register: desktop_common_root_mount
  changed_when: false
  check_mode: false

- name: Check installed target files
  ansible.builtin.stat:
    path: "{{ item }}"
  loop:
    - /etc/gentoo-release
    - /etc/fstab
  register: desktop_common_target_files

- name: Validate installed target boundary
  ansible.builtin.assert:
    that:
      - ansible_system == 'Linux'
      - ansible_architecture == 'x86_64'
      - desktop_common_target_files.results | selectattr('stat.exists') | list | length == desktop_common_target_files.results | length
      - desktop_common_root_mount.stdout is not search('(^|\\s)(overlay|squashfs|iso9660|tmpfs)(\\s|$)')
    fail_msg: "DESKTOP_FAILED: target does not look like an installed amd64 Gentoo system; refusing to run desktop profile against a live ISO or temporary root."
    success_msg: "Installed target boundary checks passed."

- name: Read selected desktop user account
  ansible.builtin.command:
    argv:
      - getent
      - passwd
      - "{{ desktop_common_user }}"
  register: desktop_common_user_passwd
  changed_when: false
  failed_when: false
  check_mode: false

- name: Require selected desktop user account
  ansible.builtin.assert:
    that:
      - desktop_common_user_passwd.rc == 0
      - desktop_common_user_passwd.stdout.split(':') | length >= 7
    fail_msg: "DESKTOP_FAILED: DESKTOP_USER must name an existing installed-system user: {{ desktop_common_user }}"
    success_msg: "Selected desktop user account exists."

- name: Store selected desktop user fields
  ansible.builtin.set_fact:
    desktop_common_user_fields: "{{ desktop_common_user_passwd.stdout.split(':') }}"

- name: Read selected desktop user primary group
  ansible.builtin.command:
    argv:
      - getent
      - group
      - "{{ desktop_common_user_fields[3] }}"
  register: desktop_common_user_group
  changed_when: false
  failed_when: false
  check_mode: false

- name: Require selected desktop user primary group
  ansible.builtin.assert:
    that:
      - desktop_common_user_group.rc == 0
      - desktop_common_user_group.stdout.split(':') | length >= 3
    fail_msg: "DESKTOP_FAILED: selected desktop user primary group was not found: {{ desktop_common_user_fields[3] }}"
    success_msg: "Selected desktop user primary group exists."

- name: Store selected desktop user paths
  ansible.builtin.set_fact:
    desktop_common_user_group_fields: "{{ desktop_common_user_group.stdout.split(':') }}"
    desktop_common_user_home: "{{ desktop_common_user_fields[5] }}"
    desktop_common_user_shell: "{{ desktop_common_user_fields[6] }}"

- name: Validate selected desktop user home
  ansible.builtin.assert:
    that:
      - desktop_common_user_home is match('^/home/[A-Za-z0-9_.-]+$')
      - desktop_common_user_shell is match('^/')
      - desktop_common_user_group_fields | length >= 3
    fail_msg: "DESKTOP_FAILED: selected desktop user home, shell, or primary group is not suitable for managed session files."
    success_msg: "Selected desktop user is suitable for managed session files."

- name: Check non-root sudo access for desktop mutation
  ansible.builtin.command:
    argv:
      - sudo
      - -n
      - "true"
  register: desktop_common_sudo_check
  changed_when: false
  failed_when: false
  check_mode: false
  when: ansible_user_id != 'root'

- name: Require root or passwordless sudo for desktop mutation
  ansible.builtin.assert:
    that:
      - ansible_user_id == 'root' or desktop_common_sudo_check.rc == 0
    fail_msg: "DESKTOP_FAILED: DESKTOP_TARGET_USER must be root or have passwordless sudo for Makefile-driven desktop installation."
    success_msg: "Desktop target user can elevate for package and config changes."

- name: Read systemd display manager enablement
  ansible.builtin.command:
    argv:
      - systemctl
      - is-enabled
      - display-manager.service
  register: desktop_common_systemd_display_manager
  changed_when: false
  failed_when: false
  check_mode: false
  when:
    - desktop_common_action in ['install', 'validate']
    - desktop_common_display_manager == 'none'
    - ansible_service_mgr | default('') == 'systemd'

- name: Read OpenRC default runlevel services
  ansible.builtin.command:
    argv:
      - rc-update
      - show
      - default
  register: desktop_common_openrc_services
  changed_when: false
  failed_when: false
  check_mode: false
  when:
    - desktop_common_action in ['install', 'validate']
    - desktop_common_display_manager == 'none'
    - ansible_service_mgr | default('') != 'systemd'

- name: Store display manager policy result
  ansible.builtin.set_fact:
    desktop_common_display_manager_disabled: >-
      {{
        desktop_common_action == 'plan'
        or desktop_common_display_manager != 'none'
        or (
          ansible_service_mgr | default('') == 'systemd'
          and desktop_common_systemd_display_manager.rc | default(1) != 0
        )
        or (
          ansible_service_mgr | default('') != 'systemd'
          and desktop_common_openrc_services.stdout | default('') is not search('(^|\\n)\\s*(xdm|display-manager|gdm|sddm|lightdm)\\s')
        )
      }}

- name: Define desktop Portage USE policy
  ansible.builtin.set_fact:
    desktop_common_package_use_entries:
      - "dev-cpp/cairomm X"
      - "dev-cpp/gtkmm X wayland"
      - "dev-libs/glib introspection"
      - "media-libs/freetype harfbuzz"
      - "media-libs/libglvnd X"
      - "media-libs/mesa X wayland"
      - "x11-libs/cairo X"
      - "x11-libs/gtk+ X wayland"
      - "x11-libs/libxkbcommon X wayland"
      - "x11-libs/pango X introspection"
    desktop_common_package_use_content: |
      # Managed by gentoo-ai-installer desktop profiles.
      # Required for post-install X11 and Wayland desktop package dependency resolution.
      dev-cpp/cairomm X
      dev-cpp/gtkmm X wayland
      dev-libs/glib introspection
      media-libs/freetype harfbuzz
      media-libs/libglvnd X
      media-libs/mesa X wayland
      x11-libs/cairo X
      x11-libs/gtk+ X wayland
      x11-libs/libxkbcommon X wayland
      x11-libs/pango X introspection

- name: Check package.use path shape
  ansible.builtin.stat:
    path: /etc/portage/package.use
  register: desktop_common_package_use_stat
  when: desktop_common_action in ['plan', 'install']

- name: Validate package.use path shape
  ansible.builtin.assert:
    that:
      - not desktop_common_package_use_stat.stat.exists or desktop_common_package_use_stat.stat.isdir or desktop_common_package_use_stat.stat.isreg
    fail_msg: "DESKTOP_FAILED: /etc/portage/package.use must be a directory, regular file, or absent."
    success_msg: "Desktop package.use path shape is valid."
  when: desktop_common_action in ['plan', 'install']

- name: Define desktop package.use target
  ansible.builtin.set_fact:
    desktop_common_package_use_target: >-
      {{
        '/etc/portage/package.use/zz-gentoo-ai-installer-desktop'
        if (not desktop_common_package_use_stat.stat.exists or desktop_common_package_use_stat.stat.isdir)
        else '/etc/portage/package.use'
      }}
  when: desktop_common_action in ['plan', 'install']

- name: Report desktop package.use plan
  ansible.builtin.debug:
    msg:
      package_use_target: "{{ desktop_common_package_use_target }}"
      package_use_entries: "{{ desktop_common_package_use_entries }}"
      autounmask_allowed: false
      keyword_changes_allowed: false
  when: desktop_common_action in ['plan', 'install']

- name: Ensure package.use directory exists for desktop policy
  ansible.builtin.file:
    path: /etc/portage/package.use
    state: directory
    mode: "0755"
  become: true
  when:
    - desktop_common_action == 'install'
    - not ansible_check_mode
    - not desktop_common_package_use_stat.stat.exists

- name: Install desktop package.use policy in package.use directory
  ansible.builtin.copy:
    content: "{{ desktop_common_package_use_content }}"
    dest: "{{ desktop_common_package_use_target }}"
    owner: root
    group: root
    mode: "0644"
  become: true
  when:
    - desktop_common_action == 'install'
    - not ansible_check_mode
    - desktop_common_package_use_target != '/etc/portage/package.use'

- name: Remove legacy desktop package.use policy file
  ansible.builtin.file:
    path: /etc/portage/package.use/gentoo-ai-installer-desktop
    state: absent
  become: true
  when:
    - desktop_common_action == 'install'
    - not ansible_check_mode
    - desktop_common_package_use_target != '/etc/portage/package.use'

- name: Install desktop package.use policy in package.use file
  ansible.builtin.blockinfile:
    path: /etc/portage/package.use
    marker: "# {mark} gentoo-ai-installer desktop profile USE flags"
    block: "{{ desktop_common_package_use_content | trim }}"
    create: true
    owner: root
    group: root
    mode: "0644"
  become: true
  when:
    - desktop_common_action == 'install'
    - not ansible_check_mode
    - desktop_common_package_use_target == '/etc/portage/package.use'

- name: Report desktop common plan
  ansible.builtin.debug:
    msg:
      action: "{{ desktop_common_action }}"
      profile: "{{ desktop_common_profile }}"
      user: "{{ desktop_common_user }}"
      user_home: "{{ desktop_common_user_home }}"
      session_start: "{{ desktop_common_session_start }}"
      display_manager: "{{ desktop_common_display_manager }}"
      enable_portal: "{{ desktop_common_enable_portal }}"
      enable_xwayland: "{{ desktop_common_enable_xwayland }}"
      experimental_ok: "{{ desktop_common_experimental_ok }}"
      package_source: "{{ desktop_common_package_source }}"
      package_use_target: "{{ desktop_common_package_use_target | default('not checked') }}"
      target_root: "{{ desktop_common_root_mount.stdout }}"
      live_iso_rejected: true
      destructive_install_commands_allowed: false
