---
- name: Install verified Gentoo stage3 into target root
  hosts: gentoo_live
  gather_facts: true
  roles:
    - role: common/live_preflight
    - role: common/stage3
    - role: common/install_state
      vars:
        install_state_phase: stage3-install
        install_state_evidence_paths:
          - "logs/install-runs/{{ install_run_id | default(ansible_date_time.iso8601_basic_short) }}/stage3/verification.json"
          - "logs/install-runs/{{ install_run_id | default(ansible_date_time.iso8601_basic_short) }}/stage3/extraction.json"
