---
- name: Run final reboot readiness checks
  hosts: gentoo_live
  gather_facts: true
  vars_files:
    - ../group_vars/all.yml
    - "../group_vars/{{ profile | default('openrc') }}.yml"
  roles:
    - role: common/live_preflight
    - role: common/ssh
    - role: common/final_checks
    - role: common/install_state
      vars:
        install_state_phase: final-checks
        install_state_evidence_paths:
          - "logs/install-runs/{{ install_run_id | default(ansible_date_time.iso8601_basic_short) }}/final-checks/reboot-readiness.json"
