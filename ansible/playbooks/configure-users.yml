---
- name: Configure target users and access
  hosts: gentoo_live
  gather_facts: true
  vars_files:
    - ../group_vars/all.yml
    - "../group_vars/{{ profile | default('openrc') }}.yml"
  roles:
    - role: common/live_preflight
    - role: common/chroot
    - role: common/users
    - role: common/install_state
      vars:
        install_state_phase: users-and-access
        install_state_evidence_paths:
          - "logs/install-runs/{{ install_run_id | default(ansible_date_time.iso8601_basic_short) }}/users/users-access.json"
