---
- name: Apply approved Gentoo GPT partition layout
  hosts: gentoo_live
  gather_facts: true
  roles:
    - role: common/disk_detection
    - role: common/disk_safety
      vars:
        disk_safety_require_confirmation: true
    - role: common/install_plan
    - role: common/partition_plan
    - role: common/partitioning
    - role: common/disk_detection
    - role: common/disk_safety
    - role: common/install_state
      vars:
        install_state_phase: partition-apply
        install_state_evidence_paths:
          - "logs/install-runs/{{ install_run_id | default(ansible_date_time.iso8601_basic_short) }}/partition/before.json"
          - "logs/install-runs/{{ install_run_id | default(ansible_date_time.iso8601_basic_short) }}/partition/after.json"
