---
- name: Mount approved Gentoo target filesystems
  hosts: gentoo_live
  gather_facts: true
  roles:
    - role: common/disk_detection
    - role: common/disk_safety
      vars:
        disk_safety_allow_mounted_descendants: true
        disk_safety_refresh_after_mount: true
    - role: common/install_plan
    - role: common/partition_plan
    - role: common/mount_plan
    - role: common/filesystem_plan
    - role: common/mount_target
    - role: common/disk_detection
    - role: common/disk_safety
      vars:
        disk_safety_allow_mounted_descendants: true
    - role: common/install_state
      vars:
        install_state_phase: mount-target
        install_state_evidence_paths:
          - "logs/install-runs/{{ install_run_id | default(ansible_date_time.iso8601_basic_short) }}/mount-target/before.json"
          - "logs/install-runs/{{ install_run_id | default(ansible_date_time.iso8601_basic_short) }}/mount-target/after.json"
