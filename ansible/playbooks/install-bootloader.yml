---
- name: Install GRUB UEFI bootloader
  hosts: gentoo_live
  gather_facts: true
  vars_files:
    - ../group_vars/all.yml
    - "../group_vars/{{ profile | default('openrc') }}.yml"
  roles:
    - role: common/live_preflight
    - role: common/disk_detection
    - role: common/disk_safety
      vars:
        disk_safety_require_confirmation: false
        disk_safety_allow_mounted_descendants: true
    - role: common/chroot
    - role: common/bootloader
    - role: common/install_state
      vars:
        install_state_phase: bootloader
        install_state_evidence_paths:
          - "logs/install-runs/{{ install_run_id | default(ansible_date_time.iso8601_basic_short) }}/bootloader/grub.json"
