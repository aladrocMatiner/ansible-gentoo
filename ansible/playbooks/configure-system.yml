---
- name: Configure Gentoo target system identity
  hosts: gentoo_live
  gather_facts: true
  pre_tasks:
    - name: Load init-specific variables
      ansible.builtin.include_vars:
        file: "{{ playbook_dir }}/../group_vars/{{ profile }}.yml"
  roles:
    - role: common/live_preflight
    - role: common/chroot
    - role: common/locale_timezone_hostname
    - role: common/install_state
      vars:
        install_state_phase: system-config
        install_state_evidence_paths:
          - "logs/install-runs/{{ install_run_id | default(ansible_date_time.iso8601_basic_short) }}/system-config/identity.json"
