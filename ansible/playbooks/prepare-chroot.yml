---
- name: Prepare Gentoo target root for chroot tasks
  hosts: gentoo_live
  gather_facts: true
  roles:
    - role: common/live_preflight
    - role: common/chroot
    - role: common/install_state
      vars:
        install_state_phase: chroot-preparation
        install_state_evidence_paths:
          - "logs/install-runs/{{ install_run_id | default(ansible_date_time.iso8601_basic_short) }}/chroot/prepare.json"
