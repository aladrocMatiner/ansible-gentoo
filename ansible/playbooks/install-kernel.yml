---
- name: Install Gentoo distribution kernel
  hosts: gentoo_live
  gather_facts: true
  pre_tasks:
    - name: Load init-specific variables
      ansible.builtin.include_vars:
        file: "{{ playbook_dir }}/../group_vars/{{ profile }}.yml"
  roles:
    - role: common/live_preflight
    - role: common/chroot
    - role: common/kernel
    - role: common/install_state
      vars:
        install_state_phase: kernel-install
        install_state_evidence_paths:
          - "logs/install-runs/{{ install_run_id | default(ansible_date_time.iso8601_basic_short) }}/kernel/kernel.json"
